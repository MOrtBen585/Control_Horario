<div [formGroup]="formGroup()">
  <div class="space-y-6">
    <app-foto-uploader [formGroup]="formGroup()"></app-foto-uploader>

    <h2 class="text-xl font-semibold">Activación</h2>

    <div class="bg-base-100 border rounded p-6 space-y-6 max-w-xl">
      <!-- Baja indefinida -->
      <div>
        <label class="inline-flex items-center gap-2">
          <input type="checkbox" [formControl]="bajaIndefinidaCtrl" />
          <span>Marcar como baja indefinida</span>
        </label>
      </div>

      <!-- Activación -->
      <div>
        <label class="inline-flex items-center gap-2">
          <input type="checkbox" [formControl]="activoCtrl" />
          <span>Activar</span>
        </label>
      </div>
    </div>
  </div>
</div>
