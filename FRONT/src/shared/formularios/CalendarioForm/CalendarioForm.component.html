<form [formGroup]="form" class="space-y-6">
  <!-- Campo de nombre, solo si editable -->
  <div *ngIf="editable()">
    <label class="block text-sm font-medium mb-1">Nombre del calendario*</label>
    <input formControlName="nombre" type="text" class="w-full border px-3 py-2 rounded"
      placeholder="Nombre del calendario" />
    <div *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched" class="text-red-500 text-sm mt-1">
      El nombre es obligatorio
    </div>
  </div>

  <!-- Selección de días del año -->
  <div>
    @if (editable()) {
    <h4 class="font-semibold text-lg mb-4">Selecciona los días de vacaciones</h4>
    } @else {
    <h4 class="font-semibold text-lg mb-4">Días de vacaciones</h4>
    }
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div *ngFor="let mes of meses" class="space-y-2">
        <h5 class="text-center font-semibold text-base">{{ nombreMes(mes) }}</h5>
        <app-calendario-mes [mes]="mes" [anio]="anio" [seleccionados]="diasSeleccionados" [editable]="editable()"
          (toggle)="editable() && toggleDia($event)">
        </app-calendario-mes>
      </div>
    </div>
  </div>

  <!-- Botones solo si editable -->
  <div class="flex justify-end gap-2 pt-6 border-t mt-8" *ngIf="editable()">
    <button type="button" (click)="save()" class="btn btn-primary">Guardar</button>
    <button type="button" (click)="cancelled.emit()" class="btn btn-ghost">Cancelar</button>
  </div>
</form>
