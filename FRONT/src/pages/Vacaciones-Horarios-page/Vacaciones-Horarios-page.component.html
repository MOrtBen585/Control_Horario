<div class="bg-base-100 p-6 rounded shadow text-black">
  <!-- Encabezado -->
  <div class="mb-4">
    <h2 class="text-2xl font-semibold flex items-center gap-2">
      <span class="material-icons">calendar_today</span>
      Vacaciones y horarios
    </h2>
    <p class="text-sm text-gray-600">
      Aquí podrás consultar visualmente las vacaciones y horarios de tus empleados/as.
    </p>
  </div>

  <!-- Buscador y Filtros -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
    <app-filtro-vacaciones (search)="onSearch($event)"></app-filtro-vacaciones>
  </div>

  <!-- Controles -->
  <div class="flex justify-between items-center mb-4">
    <div class="space-x-2">
      <button class="btn" [class.btn-active]="modoVista() === 'dia'" (click)="cambiarVista('dia')">Día</button>
      <button class="btn" [class.btn-active]="modoVista() === 'mes'" (click)="cambiarVista('mes')">Mes</button>
      <button class="btn" [class.btn-active]="modoVista() === 'anio'" (click)="cambiarVista('anio')">Año</button>
    </div>
    <button class="btn btn-outline">🖨 Imprimir</button>
  </div>

  <!-- Estados: Cargando -->
  @if (empleados.isLoading()) {
  <div class="flex justify-center items-center h-48">
    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
        <path fill="currentColor" fill-opacity="0" stroke-dasharray="64" stroke-dashoffset="64"
          d="M3 12c0 4.97 4.03 9 9 9c4.97 0 9 -4.03 9 -9c0 -4.97 -4.03 -9 -9 -9c-4.97 0 -9 4.03 -9 9Z">
          <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.6s" values="64;0" />
          <animate fill="freeze" attributeName="fill-opacity" begin="1.1s" dur="0.15s" values="0;0.3" />
        </path>
        <path stroke-dasharray="12" stroke-dashoffset="12" d="M7 12h9.5">
          <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.7s" dur="0.2s" values="12;0" />
        </path>
        <path stroke-dasharray="8" stroke-dashoffset="8" d="M17 12l-4 4M17 12l-4 -4">
          <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.9s" dur="0.2s" values="8;0" />
        </path>
      </g>
    </svg>
  </div>
  }

  <!-- Estados: Error -->
  @else if (empleados.error()) {
  <div class="text-center text-red-600 bg-red-100 p-4 rounded mb-4">
    <strong>Error:</strong> No se pudieron cargar los empleados. Inténtalo de nuevo más tarde.
  </div>
  }

  <!-- Estados: Datos cargados -->
  @else if (empleados.value()) {
  <tabla-vacaciones [empleados]="empleados.value() || []" [filterBy]="searchTerm()" [modoVista]="modoVista()"
    [fechaReferencia]="fechaReferencia()">
  </tabla-vacaciones>

  }
</div>
