<div class="flex justify-center items-center min-h-screen bg-gray-100">
  <form [formGroup]="form" (ngSubmit)="login()" class="bg-white shadow-md rounded p-6 w-full max-w-sm space-y-4">
    <h2 class="text-2xl font-semibold text-center">Iniciar sesión</h2>

    <div>
      <label for="email" class="block text-sm font-medium mb-1">Correo</label>
      <input type="email" id="email" formControlName="email" class="w-full border rounded px-3 py-2"
        placeholder="usuario@correo.com" />
      <p *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="text-sm text-red-600 mt-1">
        Introduce un correo válido
      </p>
    </div>

    <div>
      <label for="password" class="block text-sm font-medium mb-1">Contraseña</label>
      <input type="password" id="password" formControlName="password" class="w-full border rounded px-3 py-2"
        placeholder="••••••••" />
      <p *ngIf="form.get('password')?.invalid && form.get('password')?.touched" class="text-sm text-red-600 mt-1">
        La contraseña es obligatoria
      </p>
    </div>

    <button type="submit" [disabled]="form.invalid"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded disabled:opacity-50">
      Entrar
    </button>
  </form>
</div>
