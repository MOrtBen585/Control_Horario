<!-- employee-table.component.html -->
<div class="bg-white rounded shadow-xl overflow-x-auto text-black">
  <table class="w-full text-sm text-left border-collapse">
    <thead class="bg-gray-100">
      <tr>
        <th class="items-center text-center">Modificar</th>
        <th class="px-4 py-2">Nombre y apellidos</th>
        <th class="px-4 py-2">Teléfono</th>
        <th class="px-4 py-2">Email</th>
        <th class="px-4 py-2">Contrato</th>
        <th class="px-4 py-2">Docs. Pendientes</th>
      </tr>
    </thead>
    <tbody>
      @for (empleado of empleados(); track $index) {
      <tr class="border-t hover:bg-gray-50">
        <!-- Columna 1: botón de detalles -->
        <td class="text-center w-12">
          <button (click)="onVerDetalles(empleado)" class="text-gray-500 hover:text-black" title="Ver detalles">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
              <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                <path fill="currentColor" fill-opacity="0" stroke-dasharray="64" stroke-dashoffset="64"
                  d="M3 12c0 4.97 4.03 9 9 9c4.97 0 9 -4.03 9 -9c0 -4.97 -4.03 -9 -9 -9c-4.97 0 -9 4.03 -9 9Z">
                  <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.6s" values="64;0" />
                  <animate fill="freeze" attributeName="fill-opacity" begin="1.1s" dur="0.15s" values="0;0.3" />
                </path>
                <path stroke-dasharray="12" stroke-dashoffset="12" d="M7 12h9.5">
                  <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.7s" dur="0.2s" values="12;0" />
                </path>
                <path stroke-dasharray="8" stroke-dashoffset="8" d="M17 12l-4 4M17 12l-4 -4">
                  <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.9s" dur="0.2s" values="8;0" />
                </path>
              </g>
            </svg>
          </button>
        </td>

        <!-- Columna 2: Nombre y apellidos -->
        <td class="px-4 py-2 font-medium">{{ empleado.nombre }} {{ empleado.apellidos }}</td>

        <!-- Columna 3: Teléfono -->
        <td class="px-4 py-2">{{ empleado.telefono }}</td>

        <!-- Columna 4: Email -->
        <td class="px-4 py-2">
          <span class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded text-xs">
            {{ empleado.email }}
          </span>
        </td>

        <!-- Columna 5: Contrato (calendario) -->
        <td class="px-4 py-2">{{ empleado.contratoDesde | date: 'dd/MM/yyyy' }}</td>

        <!-- Columna 6: Docs. Pendientes (placeholder) -->
        <td class="px-4 py-2 text-center">0</td>
      </tr>
      }
    </tbody>


  </table>
</div>
