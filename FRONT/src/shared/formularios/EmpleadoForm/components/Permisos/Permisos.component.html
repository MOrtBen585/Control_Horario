<div class="space-y-6">
  <app-foto-uploader [formGroup]="formGroup"></app-foto-uploader>

  <h2 class="text-xl font-semibold">Permisos especiales</h2>

  <div class="bg-base-100 border rounded p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Columna 1: permisos por defecto -->
    <div class="space-y-2">
      <label class="block text-sm font-medium">Permisos por defecto*</label>
      <select class="w-full border rounded px-3 py-2" [formControl]="permisosPorDefectoCtrl">
        <option value="base">Base</option>
        <option value="intermedio">Intermedio</option>
        <option value="admin">Administrador</option>
      </select>
      <div class="bg-blue-100 text-blue-800 text-sm p-3 rounded border border-blue-300">
        Permisos por defecto configurados para un empleado.
      </div>
    </div>

    <!-- Columna 2: permisos extra -->
    <div class="space-y-2">
      <label class="block text-sm font-medium">Permisos extra</label>
      <select class="w-full border rounded px-3 py-2" [formControl]="permisosExtraCtrl">
        <option value="">Sin permisos extra</option>
        <option value="ver-fichajes">Ver fichajes</option>
        <option value="editar-vacaciones">Editar vacaciones</option>
        <option value="reportes">Ver reportes</option>
      </select>
      <div class="bg-blue-100 text-blue-800 text-sm p-3 rounded border border-blue-300">
        Puedes asignar permisos especiales previamente seteados para este empleado.
      </div>
    </div>
  </div>
</div>
