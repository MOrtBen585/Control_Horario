<div class="min-h-screen bg-gray-100 p-6">
  <div class="bg-white p-6 rounded shadow">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-2xl font-semibold">Calendarios</h2>
      <button (click)="openModal()" class="btn btn-success">➕ Crear calendario</button>
    </div>

    <div *ngIf="calendarios.isLoading()" class="flex justify-center py-10">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24">
        <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
          <path fill="currentColor" fill-opacity="0" stroke-dasharray="64" stroke-dashoffset="64"
            d="M3 12c0 4.97 4.03 9 9 9c4.97 0 9 -4.03 9 -9c0 -4.97 -4.03 -9 -9 -9c-4.97 0 -9 4.03 -9 9Z">
            <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.6s" values="64;0" />
            <animate fill="freeze" attributeName="fill-opacity" begin="1.1s" dur="0.15s" values="0;0.3" />
          </path>
          <path stroke-dasharray="12" stroke-dashoffset="12" d="M7 12h9.5">
            <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.7s" dur="0.2s" values="12;0" />
          </path>
          <path stroke-dasharray="8" stroke-dashoffset="8" d="M17 12l-4 4M17 12l-4 -4">
            <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.9s" dur="0.2s" values="8;0" />
          </path>
        </g>
      </svg>
    </div>

    <div *ngIf="calendarios.error()" class="text-red-600 bg-red-100 p-4 rounded">
      Error cargando calendarios.
    </div>

    <table *ngIf="calendarios.value()" class="w-full text-sm border-collapse">
      <thead class="bg-gray-100">
        <tr>
          <th class="px-4 py-2 text-center">Nombre</th>
          <th class="px-4 py-2 text-center">Vacaciones fijadas</th>
          <th class="px-4 py-2 text-center">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of calendarios.value()" class="border-t hover:bg-gray-50">
          <td class="px-4 py-2 text-center">{{ c.nombre }}</td>
          <td class="px-4 py-2 text-center">{{ c.diasFestivos.length || 0 }}</td>
          <td class="px-4 py-2 text-center">
            <button (click)="openModal(c)" class="text-blue-600 hover:underline">Editar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="editingCalendario()"
    class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 overflow-auto p-4">
    <div class="bg-white p-6 rounded shadow-lg w-full max-w-4xl relative max-h-[90vh] overflow-y-auto">
      <button (click)="closeModal()" class="absolute top-4 right-4">✖️</button>
      <h3 class="text-xl font-semibold mb-4">
        {{ editingCalendario()?.id ? 'Editar calendario' : 'Nuevo calendario' }}
      </h3>

      <app-calendario-form [editable]="true" [calendario]="editingCalendario()" (saved)="guardar($event)"
        (cancelled)="closeModal()">
      </app-calendario-form>
    </div>
  </div>
</div>
