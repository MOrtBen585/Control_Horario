<div [formGroup]="formGroup()">

  <!-- Subir foto del empleado -->
  <app-foto-uploader [formGroup]="formGroup()"></app-foto-uploader>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nombre*</label>
      <input type="text" formControlName="nombre" class="w-full border px-3 py-2 rounded" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Apellidos</label>
      <input type="text" formControlName="apellidos" class="w-full border px-3 py-2 rounded" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">DNI/NIE</label>
      <input type="text" formControlName="dni" class="w-full border px-3 py-2 rounded" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Móvil*</label>
      <input type="text" formControlName="telefono" class="w-full border px-3 py-2 rounded" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
      <input type="email" formControlName="email" class="w-full border px-3 py-2 rounded" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de nacimiento</label>
      <input type="date" formControlName="fechaNacimiento" class="w-full border px-3 py-2 rounded" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Género legal</label>
      <select formControlName="genero" class="w-full border px-3 py-2 rounded">
        <option value="" disabled selected>Selecciona una opción</option>
        <option value="hombre">Hombre</option>
        <option value="mujer">Mujer</option>
        <option value="otro">Otro</option>
        <option value="no_definir">Prefiero no definirlo</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Código cuenta cotización (CCC)</label>
      <select formControlName="ccc" class="w-full border px-3 py-2 rounded">
        <option value="">Selecciona una opción</option>
        <option *ngFor="let opt of ['12345678', '87654321']" [value]="opt">{{ opt }}</option>
      </select>
    </div>
  </div>
</div>
